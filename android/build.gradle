// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

// Define SDK versions to match app.json and gradle.properties
ext {
  minSdkVersion = 24
  targetSdkVersion = 36
  compileSdkVersion = 36
  buildToolsVersion = "36.0.0"
  ndkVersion = "27.1.12297006"
  hermesEnabled = (findProperty('hermesEnabled') ?: "true").toBoolean()
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
  
  // Force minSdkVersion 24 for all projects after evaluation
  afterEvaluate { project ->
    if (project.hasProperty('android')) {
      project.android.defaultConfig.minSdkVersion = 24
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
